# TEMPLATE FORMAT
#
# [[mods]]    : Required header.
#
# name        : Display name for the mod.
# author      : Display name for the author.
# description : A short description of the mod's function.
# repository  : URL for the plugin repository.
# provider    : Repository provider, "GitHub" OR "Forgejo".
# file        : Name of the plugin file in each Release. Supports wildcards (*).
#
# categories (optional)   : List of applicable categories. Recommended:
#                           "Appearance", "Charting", "Integrations", or "Utility"
# dependencies (optional) : List of dependency IDs. Format IDs as "AUTHOR_MODNAME"
#                           with no spaces. Example: "Raoul1808_SpinCore".

[[mods]]
name = "SpinCore"
author = "Raoul1808"
description = "Utility and UI functions for other mods"
repository = "https://github.com/Raoul1808/SpinCore"
provider = "GitHub"
file = "SpinCore.zip"
categories = ["Utility"]

